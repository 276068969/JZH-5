<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>后台管理 - 候鸟迁徙监管平台</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <strong>后台管理</strong>
      <span>告警处置与监管发布</span>
    </div>
    <nav>
      <a href="/">监测台</a>
      <a href="/admin.html">后台管理</a>
      <button class="ghost" id="logoutBtn">退出</button>
    </nav>
  </header>

  <main class="shell admin-shell">
    <section class="admin-aside">
      <form class="login-panel compact" id="loginForm">
        <h2>管理员登录</h2>
        <label>用户名 <input name="username" value="admin"></label>
        <label>密码 <input name="password" type="password" value="Admin@2026"></label>
        <button type="submit">进入后台</button>
        <small id="loginMsg">管理员可发布通知，巡护员可处理告警。</small>
      </form>

      <form class="panel broadcast-form" id="broadcastForm">
        <div class="panel-head">
          <h2>监管通知</h2>
          <span>管理员</span>
        </div>
        <input name="title" placeholder="通知标题" required>
        <textarea name="content" rows="5" placeholder="通知内容" required></textarea>
        <button type="submit">发布通知</button>
      </form>
    </section>

    <section class="admin-main">
      <div class="panel">
        <div class="panel-head">
          <h2>告警处置台</h2>
          <span>按事件闭环</span>
        </div>
        <div class="filter-panel" id="alertFilters">
          <div class="filter-group">
            <label>处置状态</label>
            <div class="filter-chips" data-filter="status">
              <span class="chip active" data-value="all">全部</span>
              <span class="chip" data-value="open"><span class="dot"></span> 待处理</span>
              <span class="chip" data-value="processing"><span class="dot"></span> 处理中</span>
              <span class="chip" data-value="resolved"><span class="dot"></span> 已闭环</span>
            </div>
          </div>
          <div class="filter-group">
            <label>风险等级</label>
            <div class="filter-chips" data-filter="level">
              <span class="chip active" data-value="all">全部</span>
              <span class="chip" data-value="高"><span class="dot high"></span> 高风险</span>
              <span class="chip" data-value="中"><span class="dot medium"></span> 中风险</span>
              <span class="chip" data-value="低"><span class="dot low"></span> 低风险</span>
            </div>
          </div>
          <div class="filter-group">
            <label>所属区域</label>
            <select id="filterArea">
              <option value="all">全部区域</option>
            </select>
          </div>
          <div class="filter-group">
            <label>&nbsp;</label>
            <button class="reset-btn" id="resetAlertFilters">重置筛选</button>
          </div>
        </div>
        <div id="alerts" class="admin-table"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>设备巡检</h2>
          <span>站点健康</span>
        </div>
        <div id="stations" class="admin-table"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>重点物种清单</h2>
          <span>管理员维护</span>
        </div>
        <form class="species-form" id="speciesForm">
          <div class="form-row">
            <div class="form-col">
              <label>候鸟名称</label>
              <input name="name" placeholder="如：白鹤" required>
            </div>
            <div class="form-col">
              <label>保护等级</label>
              <select name="protectionLevel" required>
                <option value="">请选择保护等级</option>
                <option value="国家一级">国家一级</option>
                <option value="国家二级">国家二级</option>
                <option value="三有保护">三有保护</option>
                <option value="无">无</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-col-full">
              <label>常见路线（可多选）</label>
              <div class="checkbox-group" id="routeCheckboxes"></div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-col-full">
              <label>监测备注</label>
              <textarea name="remarks" rows="3" placeholder="输入监测要点、识别特征等信息（可选）"></textarea>
            </div>
          </div>
          <div class="form-error-box" id="speciesFormError" hidden></div>
          <div class="form-actions">
            <button type="submit" id="speciesSubmitBtn">新增物种</button>
            <button type="button" class="secondary-btn" id="speciesCancelBtn" hidden>取消编辑</button>
          </div>
        </form>
        <div id="speciesList" class="admin-table"></div>
      </div>
    </section>
  </main>

  <script src="/assets/admin.js"></script>
</body>
</html>
